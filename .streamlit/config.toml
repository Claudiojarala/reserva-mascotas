[theme]
# Detalles activos y botones en Verde Amazónico brillante
primaryColor = "#4CAF50"

# Fondo cálido tipo arena/marfil (adiós al blanco aburrido)
backgroundColor = "#FDFBF7"

# Menú lateral en un tono Jungla Profundo que resalta de inmediato
secondaryBackgroundColor = "#1B3A2B"

# Texto principal en gris oscuro elegante para máxima legibilidad
textColor = "#263238"

font = "sans serif"
